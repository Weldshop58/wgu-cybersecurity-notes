<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WGU Cybersecurity — Study Calendar</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #222536;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #e8eaf0;
    --text2: #8b8fa8;
    --text3: #555870;
    --accent: #4f7cff;
    --accent2: #7c5cff;
    --green: #3ecf8e;
    --amber: #f5a623;
    --red: #ff6b6b;
    --pink: #e879a0;

    --c-theory-bg: rgba(79,124,255,0.12);
    --c-theory-b: rgba(79,124,255,0.5);
    --c-theory-t: #7da4ff;

    --c-lab-bg: rgba(124,92,255,0.12);
    --c-lab-b: rgba(124,92,255,0.5);
    --c-lab-t: #a87fff;

    --c-practice-bg: rgba(245,166,35,0.12);
    --c-practice-b: rgba(245,166,35,0.4);
    --c-practice-t: #f5a623;

    --c-review-bg: rgba(62,207,142,0.1);
    --c-review-b: rgba(62,207,142,0.4);
    --c-review-t: #3ecf8e;

    --c-protect-bg: rgba(255,255,255,0.04);
    --c-protect-b: rgba(255,255,255,0.12);
    --c-protect-t: #555870;

    --c-prep-bg: rgba(232,121,160,0.12);
    --c-prep-b: rgba(232,121,160,0.4);
    --c-prep-t: #e879a0;

    --c-progress-bg: rgba(255,107,107,0.12);
    --c-progress-b: rgba(255,107,107,0.4);
    --c-progress-t: #ff8080;

    --c-milestone-bg: rgba(62,207,142,0.15);
    --c-milestone-b: rgba(62,207,142,0.6);
    --c-milestone-t: #3ecf8e;

    --c-term-bg: rgba(79,124,255,0.18);
    --c-term-b: rgba(79,124,255,0.7);
    --c-term-t: #4f7cff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 18px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
    gap: 16px;
    flex-wrap: wrap;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .logo-text {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .logo-sub {
    font-size: 11px;
    color: var(--text2);
    font-family: 'JetBrains Mono', monospace;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .today-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--amber);
    background: rgba(245,166,35,0.1);
    border: 1px solid rgba(245,166,35,0.25);
    border-radius: 6px;
    padding: 4px 10px;
  }

  .days-badge {
    font-size: 11px;
    color: var(--green);
    background: rgba(62,207,142,0.1);
    border: 1px solid rgba(62,207,142,0.25);
    border-radius: 6px;
    padding: 4px 10px;
    font-weight: 500;
  }

  .main {
    display: grid;
    grid-template-columns: 220px 1fr;
    min-height: calc(100vh - 65px);
  }

  .sidebar {
    border-right: 1px solid var(--border);
    padding: 20px 16px;
    background: var(--surface);
    overflow-y: auto;
  }

  .sidebar-section {
    margin-bottom: 24px;
  }

  .sidebar-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--text3);
    margin-bottom: 10px;
    font-family: 'JetBrains Mono', monospace;
  }

  .filter-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 8px;
    border-radius: 6px;
    cursor: pointer;
    margin-bottom: 3px;
    transition: background 0.15s;
    user-select: none;
  }

  .filter-item:hover { background: var(--surface2); }

  .filter-dot {
    width: 8px;
    height: 8px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .filter-name {
    font-size: 12px;
    color: var(--text2);
    flex: 1;
  }

  .filter-item.active .filter-name { color: var(--text); }

  .filter-check {
    width: 14px;
    height: 14px;
    border-radius: 3px;
    border: 1px solid var(--border2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    flex-shrink: 0;
  }

  .filter-item.active .filter-check {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .month-focus {
    background: var(--surface2);
    border-radius: 8px;
    padding: 12px;
    border: 1px solid var(--border);
  }

  .mf-cert {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 8px;
  }

  .mf-row {
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-bottom: 4px;
  }

  .mf-label {
    font-size: 10px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: .06em;
    font-family: 'JetBrains Mono', monospace;
  }

  .mf-val {
    font-size: 11px;
    color: var(--text2);
    line-height: 1.4;
  }

  .content {
    padding: 24px 28px;
    overflow-y: auto;
  }

  .cal-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .nav-btn {
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text2);
    border-radius: 8px;
    padding: 7px 16px;
    cursor: pointer;
    font-size: 13px;
    transition: all 0.15s;
    font-family: 'Inter', sans-serif;
  }

  .nav-btn:hover {
    background: var(--surface);
    color: var(--text);
    border-color: var(--accent);
  }

  .month-title {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.5px;
  }

  .month-year {
    color: var(--text2);
    font-weight: 300;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
    margin-bottom: 20px;
  }

  .day-head {
    font-size: 11px;
    color: var(--text3);
    text-align: center;
    padding: 6px 0;
    font-weight: 500;
    font-family: 'JetBrains Mono', monospace;
  }

  .day-cell {
    min-height: 90px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px;
    transition: border-color 0.15s;
  }

  .day-cell:hover { border-color: var(--border2); }

  .day-cell.other-month {
    background: rgba(26,29,39,0.4);
    opacity: 0.4;
  }

  .day-cell.today {
    border-color: var(--amber);
    background: rgba(245,166,35,0.05);
  }

  .day-cell.past { opacity: 0.45; }

  .day-num {
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 500;
  }

  .day-cell.today .day-num {
    color: var(--amber);
    font-weight: 600;
  }

  .ev {
    font-size: 9.5px;
    padding: 2px 5px;
    border-radius: 4px;
    margin-bottom: 2px;
    line-height: 1.35;
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    border: 1px solid transparent;
    transition: opacity 0.1s;
  }

  .ev:hover { opacity: 0.75; }

  .detail-panel {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 20px 24px;
    margin-top: 4px;
    animation: slideIn 0.15s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .dp-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 12px;
    gap: 12px;
  }

  .dp-type {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .08em;
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 4px;
  }

  .dp-title {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  .dp-date {
    font-size: 11px;
    color: var(--text3);
    font-family: 'JetBrains Mono', monospace;
    margin-top: 3px;
  }

  .dp-close {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
    border-radius: 6px;
    padding: 4px 12px;
    cursor: pointer;
    font-size: 12px;
    flex-shrink: 0;
    font-family: 'Inter', sans-serif;
  }

  .dp-close:hover { border-color: var(--border2); color: var(--text); }

  .dp-desc {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.85;
    white-space: pre-line;
    border-top: 1px solid var(--border);
    padding-top: 12px;
  }

  .banner {
    border-radius: 8px;
    padding: 10px 14px;
    margin-bottom: 18px;
    font-size: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .banner-warn {
    background: rgba(245,166,35,0.1);
    border: 1px solid rgba(245,166,35,0.3);
    color: var(--amber);
  }

  .banner-info {
    background: rgba(79,124,255,0.08);
    border: 1px solid rgba(79,124,255,0.2);
    color: #7da4ff;
  }

  .banner-neutral {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text2);
  }

  @media (max-width: 700px) {
    .main { grid-template-columns: 1fr; }
    .sidebar { border-right: none; border-bottom: 1px solid var(--border); }
    .content { padding: 16px; }
    header { padding: 14px 16px; }
    .day-cell { min-height: 60px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🎓</div>
    <div>
      <div class="logo-text">WGU Cybersecurity</div>
      <div class="logo-sub">BS CSIA — Study Calendar</div>
    </div>
  </div>
  <div class="header-right">
    <div class="today-badge" id="today-badge">May 15, 2026</div>
    <div class="days-badge" id="days-badge">17 days to Term 1</div>
  </div>
</header>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">This month</div>
      <div class="month-focus" id="month-focus"></div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Show / hide</div>

      <div class="filter-item active" onclick="tf('prep')" id="fi-prep">
        <div class="filter-dot" style="background:#e879a0"></div>
        <span class="filter-name">Prep tasks</span>
        <div class="filter-check">✓</div>
      </div>
      <div class="filter-item active" onclick="tf('theory')" id="fi-theory">
        <div class="filter-dot" style="background:#4f7cff"></div>
        <span class="filter-name">Theory</span>
        <div class="filter-check">✓</div>
      </div>
      <div class="filter-item active" onclick="tf('lab')" id="fi-lab">
        <div class="filter-dot" style="background:#7c5cff"></div>
        <span class="filter-name">Lab</span>
        <div class="filter-check">✓</div>
      </div>
      <div class="filter-item active" onclick="tf('practice')" id="fi-practice">
        <div class="filter-dot" style="background:#f5a623"></div>
        <span class="filter-name">Practice</span>
        <div class="filter-check">✓</div>
      </div>
      <div class="filter-item active" onclick="tf('review')" id="fi-review">
        <div class="filter-dot" style="background:#3ecf8e"></div>
        <span class="filter-name">Review</span>
        <div class="filter-check">✓</div>
      </div>
      <div class="filter-item active" onclick="tf('protect')" id="fi-protect">
        <div class="filter-dot" style="background:#555870"></div>
        <span class="filter-name">Protected</span>
        <div class="filter-check">✓</div>
      </div>
      <div class="filter-item active" onclick="tf('progress')" id="fi-progress">
        <div class="filter-dot" style="background:#ff6b6b"></div>
        <span class="filter-name">Progress markers</span>
        <div class="filter-check">✓</div>
      </div>
      <div class="filter-item active" onclick="tf('milestone')" id="fi-milestone">
        <div class="filter-dot" style="background:#3ecf8e"></div>
        <span class="filter-name">Milestones</span>
        <div class="filter-check">✓</div>
      </div>
      <div class="filter-item active" onclick="tf('term')" id="fi-term">
        <div class="filter-dot" style="background:#4f7cff"></div>
        <span class="filter-name">Term events</span>
        <div class="filter-check">✓</div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Legend</div>
      <div style="display:flex;flex-direction:column;gap:5px">
        <div style="display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text2)"><div style="width:8px;height:8px;border-radius:2px;background:#4f7cff;flex-shrink:0"></div>Theory / Term</div>
        <div style="display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text2)"><div style="width:8px;height:8px;border-radius:2px;background:#7c5cff;flex-shrink:0"></div>Lab sessions</div>
        <div style="display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text2)"><div style="width:8px;height:8px;border-radius:2px;background:#f5a623;flex-shrink:0"></div>Practice exams</div>
        <div style="display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text2)"><div style="width:8px;height:8px;border-radius:2px;background:#3ecf8e;flex-shrink:0"></div>Review / Milestone</div>
        <div style="display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text2)"><div style="width:8px;height:8px;border-radius:2px;background:#ff6b6b;flex-shrink:0"></div>Progress marker</div>
        <div style="display:flex;align-items:center;gap:7px;font-size:11px;color:var(--text2)"><div style="width:8px;height:8px;border-radius:2px;background:#e879a0;flex-shrink:0"></div>Prep task</div>
      </div>
    </div>
  </div>

  <div class="content">
    <div id="cal"></div>
  </div>
</div>

<script>
const TODAY = new Date(2026, 4, 15);

const COLORS = {
  prep:     {bg:'var(--c-prep-bg)',     b:'var(--c-prep-b)',     t:'var(--c-prep-t)'},
  theory:   {bg:'var(--c-theory-bg)',   b:'var(--c-theory-b)',   t:'var(--c-theory-t)'},
  lab:      {bg:'var(--c-lab-bg)',      b:'var(--c-lab-b)',      t:'var(--c-lab-t)'},
  practice: {bg:'var(--c-practice-bg)', b:'var(--c-practice-b)', t:'var(--c-practice-t)'},
  review:   {bg:'var(--c-review-bg)',   b:'var(--c-review-b)',   t:'var(--c-review-t)'},
  protect:  {bg:'var(--c-protect-bg)',  b:'var(--c-protect-b)',  t:'var(--c-protect-t)'},
  progress: {bg:'var(--c-progress-bg)', b:'var(--c-progress-b)', t:'var(--c-progress-t)'},
  milestone:{bg:'var(--c-milestone-bg)',b:'var(--c-milestone-b)',t:'var(--c-milestone-t)'},
  term:     {bg:'var(--c-term-bg)',     b:'var(--c-term-b)',     t:'var(--c-term-t)'},
};

function fmt(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}

function getFocus(y,m){
  const i=(y-2026)*12+(m-5);
  if(i<0)  return {cert:'Pre-enrollment prep',res:'Finish Professor Messer A+ course',lab:'OverTheWire Bandit, Python basics',practice:'ExamCompass free quizzes'};
  if(i<2)  return {cert:'A+ Core 1 & 2',res:'Prof. Messer A+ 220-1101/1102',lab:'Cisco Packet Tracer, OverTheWire Bandit',practice:'Messer + Dion A+ practice exams'};
  if(i<4)  return {cert:'Network+',res:'Prof. Messer Network+ N10-009',lab:'Packet Tracer, Python scripts',practice:'Messer + Dion Net+ practice exams'};
  if(i<6)  return {cert:'Security+',res:'Prof. Messer Security+ SY0-701',lab:'TryHackMe SOC Level 1, Kali home lab',practice:'Messer + Dion Sec+ practice exams'};
  if(i<8)  return {cert:'Linux Essentials',res:'NetworkChuck Linux + LPI objectives',lab:'OverTheWire Natas, Wireshark',practice:'Messer Sec+ + LPI practice tests'};
  if(i<12) return {cert:'CySA+',res:'Prof. Messer CySA+ CS0-003',lab:'Splunk BOTS, TryHackMe Jr Pentest',practice:'Messer + Dion CySA+ exams'};
  if(i<15) return {cert:'Pentest+',res:'Messer Pentest+ + TCM Security',lab:'Hack The Box Starting Point',practice:'Dion Pentest+ Udemy exams'};
  if(i<18) return {cert:'CASP+',res:'CertMike CASP+ CAS-004',lab:'HTB intermediate, bug bounty recon',practice:'Dion CASP+ + CompTIA official'};
  return {cert:'Capstone',res:'Review all material + capstone writing',lab:'GitHub polish, WISP audit write-up',practice:'Resume and portfolio prep'};
}

const EVS = [];
function a(date,type,title,desc){EVS.push({date,type,title,desc});}

a('2026-05-15','progress','TODAY — 17 days to Term 1','You are here. May 15, 2026.\n\nTerm 1 starts June 1 — 17 days away.\n\nPre-enrollment priority checklist:\n• Finish Professor Messer A+ course daily\n• Anki + CompTIA decks set up on desktop and phone\n• GitHub account created, first repo made\n• VS Code + WSL2 + Python confirmed working\n• Notion study hub built out\n• OverTheWire Bandit Level 0 started\n• Contact WGU about prior learning assessment\n• Discrete math review started on Khan Academy');
a('2026-05-16','prep','Messer A+ — daily viewing','Continue through Professor Messer A+ 220-1101/1102 YouTube playlist. Goal: finish all videos before June 1.\n\nTip: 2× speed on networking modules — you know this from WISP work. Full speed on hardware, OS, and troubleshooting.');
a('2026-05-18','prep','Set up Anki decks','Install Anki desktop + AnkiWeb account + phone app. Download A+ and Net+ decks from ankiweb.net/shared/decks. Set new cards/day to 20. Sync to phone.\n\nDaily flashcard safety net — run it in the truck, at lunch, in the rink lobby.');
a('2026-05-20','prep','GitHub + dev tools setup','Create github.com account. Make first repo: wgu-cybersecurity-notes. Push subnet_calc.py and sweep.py as first commits.\n\nConfirm: VS Code WSL extension installed, python3 works in Ubuntu terminal.');
a('2026-05-22','prep','Build Notion study hub','Set up WGU Notion workspace: hub page, Quick Links, Weekly Study Log database, Wrong Answer Log database, Term 1 sub-pages. Link existing Messer template into A+ page.');
a('2026-05-25','prep','Start OverTheWire Bandit','Begin Linux CLI challenges at overthewire.org/wargames/bandit. No account needed. Start Level 0.\n\nGoal before June 1: reach Level 5. Your Mikrotik CLI experience makes early levels feel familiar.');
a('2026-05-27','prep','WGU prior learning call','Contact WGU enrollment about prior learning assessment for WISP supervisor experience. Your Ubiquiti, Cambium, Mikrotik operational background may qualify for credit.');
a('2026-05-28','prep','Khan Academy discrete math','Start Khan Academy logic and discrete math — 20–30 min daily. Least intuitive subject in Term 1. Starting now builds a useful foundation before classes begin.');
a('2026-06-01','term','Term 1 begins — day 1','WGU Term 1 officially starts today.\n\nDay 1 actions:\n• Log into my.wgu.edu\n• Schedule intro call with Program Mentor\n• Review full degree plan\n• Check orientation tasks in portal\n• Confirm A+ course materials accessible\n\nCourses: IT Foundations (A+), Network & Security Foundations (Net+), Introduction to Programming, Discrete Math I.');
a('2026-07-27','progress','A+ Core 1 exam target','Target: CompTIA A+ 220-1101\n\n• Request WGU voucher ~2 weeks before\n• Score 85%+ on Messer practice exams consistently\n• Core 1 covers hardware + networking — WISP background makes networking fast\n• Book through Pearson VUE once voucher received');
a('2026-08-10','progress','A+ Core 2 exam target','Target: CompTIA A+ 220-1102\n\n• Covers OS, security, software troubleshooting\n• Needs more prep than Core 1 — Windows OS content is newer territory\n• WGU voucher included');
a('2026-09-07','progress','Network+ exam target','Target: CompTIA Network+ N10-009\n\n• Fastest cert in your stack — WISP background covers 70%+\n• Fill gaps: WAN, cloud networking, network security concepts\n• Score 85%+ on practice exams before booking\n• WGU voucher included');
a('2026-09-14','term','Target: Term 1 complete','Aim to finish all Term 1 courses by mid-September — 3.5 months instead of 6.\n\nSaves ~2 months tuition and lets you advance to Term 2 early. Talk to WGU mentor about early term advance.');
a('2026-09-21','term','WGU Term 2 begins','Term 2: Security+, Linux Essentials, Data Management, Scripting & Programming Applications.\n\nFirst week: set up home lab (VirtualBox + Kali + Metasploitable). Most important term — Security+ is the degree centerpiece.');
a('2026-11-16','progress','Linux Essentials exam target','Target: LPI Linux Essentials\n\n• 4–6 weeks study alongside Security+\n• NetworkChuck YouTube + LPI official objectives\n• Mikrotik CLI experience transfers strongly here\n• WGU voucher included');

function getNWD(y,m,wd,n){
  const first=new Date(y,m,1);
  const off=(wd-first.getDay()+7)%7;
  const d=new Date(y,m,1+off+(n-1)*7);
  return d;
}
function wim(y,m){
  const last=new Date(y,m+1,0).getDate();
  const first=new Date(y,m,1);
  const off=(1-first.getDay()+7)%7;
  if(off>=last) return 0;
  return Math.ceil((last-off)/7);
}

for(let y=2026;y<=2028;y++){
  for(let m=0;m<12;m++){
    const fc=getFocus(y,m);
    const w=wim(y,m);
    for(let wk=1;wk<=w;wk++){
      const sessions=[
        {wd:1,type:'theory',  title:'Theory — Messer + notes',    desc:`7:00–9:00pm\n\n7:00–7:45 Watch one ${fc.res} lesson. Take 5–8 bullet notes.\n7:45–8:30 WGU course reading on same topic.\n8:30–9:00 Make 8–12 Anki cards from tonight's material.\n\nCert focus: ${fc.cert}`},
        {wd:2,type:'lab',     title:'Lab — hands-on practice',    desc:`7:00–9:00pm\n\n7:00–7:15 Anki review (Monday cards)\n7:15–9:00 Hands-on lab session\n\nLab: ${fc.lab}`},
        {wd:3,type:'practice',title:'Practice — exam questions',  desc:`7:00–9:00pm\n\n7:00–7:15 Anki review (Mon+Tue cards)\n7:15–8:30 20–30 targeted practice questions\n8:30–9:00 Wrong answer review + new Anki cards\n\nResource: ${fc.practice}`},
        {wd:4,type:'protect', title:'Thursday — skating ⛸️',      desc:`Evening off — ice skating with your daughter.\n\nProtected every week without exception.\nOptional only: Anki on phone in rink lobby.`},
        {wd:5,type:'theory',  title:'Friday — extended session',  desc:`8:00am–1:00pm (day off)\n\n8:00–9:30 Deep theory or extended lab\n9:30–10:00 Real break\n10:00–11:30 Full timed mock exam (6 weeks from cert) or 30–40 practice questions\n11:30–1:00 Wrong answer review + WGU portal\n\nResource: ${fc.practice}`},
        {wd:6,type:'lab',     title:'Saturday — power session',   desc:`8:00–11:00am\n\n8:00–9:30 Deep lab or project\n9:30–10:30 Full week Anki review + WGU progress check\n10:30–11:00 Plan next week\n\nLab: ${fc.lab}`},
        {wd:0,type:'review',  title:'Sunday — wind-down review',  desc:`2:00–3:30pm\n\n2:00–3:00 Full Anki deck review + one article (krebsonsecurity.com or bleepingcomputer.com)\n3:00–3:30 Optional 10–15 question quiz\n\nAfternoon only — evening is family time.`},
      ];
      sessions.forEach(({wd,type,title,desc})=>{
        const d=getNWD(y,m,wd,wk);
        if(d.getMonth()!==m) return;
        if(y===2026&&m===4&&d<TODAY) return;
        if(y===2026&&m===4&&['theory','lab','practice','review'].includes(type)) return;
        EVS.push({date:fmt(d),type,title,desc});
      });
    }
  }
}

let cy=2026, cm=4, sel=null;
const filters={prep:true,theory:true,lab:true,practice:true,review:true,protect:true,progress:true,milestone:true,term:true};

function render(){
  const mn=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const fd=new Date(cy,cm,1).getDay();
  const dim=new Date(cy,cm+1,0).getDate();
  const dip=new Date(cy,cm,0).getDate();
  const isCur=cy===TODAY.getFullYear()&&cm===TODAY.getMonth();
  const fc=getFocus(cy,cm);

  const pmItems=EVS.filter(e=>{
    if(!['progress','milestone','term','prep'].includes(e.type)) return false;
    const[ey,em]=e.date.split('-').map(Number);
    return ey===cy&&em===cm+1;
  });
  const certTgt=pmItems.find(e=>e.type==='progress');

  const mf=document.getElementById('month-focus');
  mf.innerHTML=`<div class="mf-cert">${fc.cert}</div>
    <div class="mf-row"><div class="mf-label">Theory</div><div class="mf-val">${fc.res}</div></div>
    <div class="mf-row" style="margin-top:6px"><div class="mf-label">Lab</div><div class="mf-val">${fc.lab}</div></div>
    ${certTgt?`<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)"><div class="mf-label" style="color:#ff8080">Target</div><div class="mf-val" style="color:#ff8080">${certTgt.title}</div></div>`:''}`;

  const daysLeft=Math.ceil((new Date(2026,5,1)-TODAY)/(1000*60*60*24));
  document.getElementById('days-badge').textContent=daysLeft>0?`${daysLeft} days to Term 1`:'Term 1 active';

  let h='';

  if(isCur){
    h+=`<div class="banner banner-warn">📍 Today: May 15, 2026 — Term 1 starts in 17 days. Pre-enrollment sprint mode.</div>`;
  } else if(new Date(cy,cm,1)<new Date(2026,5,1)){
    h+=`<div class="banner banner-neutral">🕐 Pre-enrollment period — complete prep tasks before June 1.</div>`;
  } else if(new Date(cy,cm,28)>TODAY){
    h+=`<div class="banner banner-info">📅 ${fc.cert} — click any event for details.</div>`;
  }

  h+=`<div class="cal-nav">
    <button class="nav-btn" onclick="pv()">← Prev</button>
    <span class="month-title">${mn[cm]} <span class="month-year">${cy}</span></span>
    <button class="nav-btn" onclick="nx()">Next →</button>
  </div>`;

  h+=`<div class="cal-grid">`;
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d=>{h+=`<div class="day-head">${d}</div>`;});

  const tot=Math.ceil((fd+dim)/7)*7;
  for(let i=0;i<tot;i++){
    let dn,itm=true;
    if(i<fd){dn=dip-(fd-1-i);itm=false;}
    else if(i>=fd+dim){dn=i-fd-dim+1;itm=false;}
    else dn=i-fd+1;

    const isT=itm&&cy===TODAY.getFullYear()&&cm===TODAY.getMonth()&&dn===TODAY.getDate();
    const cellD=itm?new Date(cy,cm,dn):null;
    const isPast=cellD&&cellD<new Date(TODAY.getFullYear(),TODAY.getMonth(),TODAY.getDate());
    const ds=itm?fmt(new Date(cy,cm,dn)):'';
    const evs=itm?EVS.filter(e=>e.date===ds&&filters[e.type]):[];

    h+=`<div class="day-cell${!itm?' other-month':''}${isT?' today':''}${isPast&&!isT?' past':''}"><div class="day-num">${dn}</div>`;
    evs.forEach(e=>{
      const col=COLORS[e.type]||COLORS.theory;
      const st=e.title.replace(/'/g,'&#39;').replace(/"/g,'&quot;');
      h+=`<div class="ev" style="background:${col.bg};border-color:${col.b};color:${col.t}" onclick="sd('${ds}','${st}')" title="${e.title}">${e.title}</div>`;
    });
    h+=`</div>`;
  }
  h+=`</div>`;

  if(sel){
    const e=EVS.find(x=>x.date===sel.d&&x.title===sel.t);
    if(e){
      const col=COLORS[e.type]||COLORS.theory;
      const isStudy=['theory','lab','practice','review','protect'].includes(e.type);
      const lbl=e.type==='prep'?'Pre-enrollment prep task':isStudy?'Study session':'Progress marker';
      h+=`<div class="detail-panel" style="border-left:3px solid ${col.b}">
        <div class="dp-header">
          <div>
            <div class="dp-type" style="color:${col.t}">${lbl}</div>
            <div class="dp-title">${e.title}</div>
            <div class="dp-date">${e.date}</div>
          </div>
          <button class="dp-close" onclick="cd()">close</button>
        </div>
        <div class="dp-desc">${e.desc}</div>
      </div>`;
    }
  }

  document.getElementById('cal').innerHTML=h;
}

function pv(){cm--;if(cm<0){cm=11;cy--;}sel=null;render();}
function nx(){cm++;if(cm>11){cm=0;cy++;}sel=null;render();}
function sd(d,t){const tt=t.replace(/&#39;/g,"'").replace(/&quot;/g,'"');sel=(sel&&sel.d===d&&sel.t===tt)?null:{d,t:tt};render();}
function cd(){sel=null;render();}
function tf(k){
  filters[k]=!filters[k];
  const fi=document.getElementById('fi-'+k);
  fi.classList.toggle('active',filters[k]);
  render();
}

render();
</script>
